name: Daily Naver Finance Scraper

on:
  schedule:
    # 4 PM KST is 7 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch: # 수동으로 실행할 수 있는 버튼 활성화

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 레포지토리에 푸시하기 위한 쓰기 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 새롭게 생성되거나 업데이트된 json 파일들을 스테이징
          git add frontend/data/history.json frontend/data/reports_scored.json
          
          # 변경사항이 있을 경우에만 커밋 및 푸시 진행
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Daily data update" && git push)
